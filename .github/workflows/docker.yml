name: Build and publish container image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homelab-manger
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync README to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/homelab-manger
          short-description: "FastAPI app for managing homelab gear — switches, servers, BMCs"
          enable-url-completion: true

  release:
    # Only runs when a v* tag is pushed, after the image has been published.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true   # pull annotated-tag objects so we can read the message body

      - name: Read tag annotation into release body
        id: tag
        shell: bash
        run: |
          # The release-note bullets live in the annotated tag message. Pipe
          # them into the action's body input so they show up on the Release
          # page (the auto-generated commit log appends below).
          {
            echo 'body<<TAG_EOF'
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}"
            echo 'TAG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ${{ steps.tag.outputs.body }}

            ---

            Container images:
            - `ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}`
            - `docker.io/${{ secrets.DOCKERHUB_USERNAME }}/homelab-manger:${{ needs.build-and-push.outputs.version }}`
