name: Build and publish container image

on:
  push:
    # Only v* tags trigger a build. Pushing main on its own does NOT
    # build — every release is tagged (per the project's release rules)
    # and listening on both `branches: [main]` + `tags: ['v*']` causes a
    # double run when main and the tag are pushed in sequence. For ad-hoc
    # rebuilds without a new version, use `workflow_dispatch`.
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homelab-manger
          # `flavor: latest=auto` tags semver tag pushes as :latest. We
          # only build on v* tags now (see `on:` above), so dropping the
          # branch/default-branch rules — they'd never match.
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync README to Docker Hub
        # Was `github.ref == 'refs/heads/main'` — but main pushes don't
        # trigger this workflow anymore, so re-anchor on tag pushes.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/homelab-manger
          short-description: "FastAPI app for managing homelab gear — switches, servers, BMCs"
          enable-url-completion: true

  release:
    # Only runs when a v* tag is pushed, after the image has been published.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a Release
    steps:
      - name: Checkout
        # No fetch-tags: actions/checkout@v4 already fetches the tag-as-ref on
        # a tag push (GITHUB_REF=refs/tags/vX.Y.Z), and combining that with
        # fetch-tags:true triggers "Cannot fetch both <sha> and refs/tags/v…"
        # because the action tries to fetch the same ref twice. The annotated
        # tag object (and its message body) is already present in the local
        # repo after the default checkout.
        uses: actions/checkout@v4

      - name: Read tag annotation into release body
        id: tag
        shell: bash
        run: |
          # The release-note bullets live in the annotated tag message. Pipe
          # them into the action's body input so they show up on the Release
          # page (the auto-generated commit log appends below).
          {
            echo 'body<<TAG_EOF'
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}"
            echo 'TAG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ${{ steps.tag.outputs.body }}

            ---

            Container images:
            - `ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}`
            - `docker.io/${{ secrets.DOCKERHUB_USERNAME }}/homelab-manger:${{ needs.build-and-push.outputs.version }}`
