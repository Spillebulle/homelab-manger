<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLab Manger — Sign in</title>
  <link rel="icon" type="image/png" href="/static/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#0f1117',
            panel:   '#161b27',
            card:    '#1e2433',
            border:  '#2a3144',
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-surface text-gray-200 h-screen flex items-center justify-center" x-data="loginPage()" x-cloak>

  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-2 mb-6">
      <img src="/static/logo.png" alt="" class="h-9 w-9 object-contain">
      <span class="font-bold text-white text-xl">HomeLab Manger</span>
    </div>

    <form @submit.prevent="submit()"
          class="bg-panel border border-border rounded-lg p-6 shadow-lg space-y-4">
      <h1 class="text-lg font-semibold text-white text-center">Sign in</h1>

      <div>
        <label class="block text-xs text-gray-400 mb-1">Username</label>
        <input x-model="username" type="text" autocomplete="username" required autofocus
               class="w-full bg-card border border-border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="block text-xs text-gray-400 mb-1">Password</label>
        <input x-model="password" type="password" autocomplete="current-password" required
               class="w-full bg-card border border-border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>

      <div x-show="error" x-text="error"
           class="text-sm text-red-400 bg-red-500/10 border border-red-500/30 rounded px-3 py-2"></div>

      <button type="submit" :disabled="busy"
              class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-sm font-medium px-3 py-2 rounded transition-colors">
        <span x-show="!busy">Sign in</span>
        <span x-show="busy"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
      </button>
    </form>

    <p class="text-xs text-gray-500 text-center mt-4">
      First time? Default credentials are
      <code class="text-gray-400">admin</code> / <code class="text-gray-400">changeme</code>
      unless <code class="text-gray-400">ADMIN_PASSWORD</code> was set on first run.
    </p>
  </div>

  <script>
    function loginPage() {
      return {
        username: 'admin',
        password: '',
        error: '',
        busy: false,
        async submit() {
          this.error = '';
          this.busy = true;
          try {
            const r = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: this.username, password: this.password }),
            });
            if (r.ok) {
              const next = new URLSearchParams(window.location.search).get('next') || '/';
              window.location.href = next;
              return;
            }
            const data = await r.json().catch(() => ({}));
            this.error = data.detail || 'Sign-in failed';
          } catch (e) {
            this.error = 'Network error';
          } finally {
            this.busy = false;
          }
        },
      };
    }
  </script>
</body>
</html>
